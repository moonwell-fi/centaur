name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, docker]
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      SECRET_MANAGER_TOKEN: ${{ secrets.SECRET_MANAGER_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    defaults:
      run:
        working-directory: /home/ubuntu/github/paradigmxyz/centaur

    steps:
      - name: Sync repo
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Build sandbox image
        run: docker build -t centaur-agent:latest services/sandbox/

      - name: Deploy
        run: |
          docker compose build
          docker compose up -d

      - name: Health check
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API health check failed after 90s"
          exit 1

      - name: Notify Slack
        if: always()
        continue-on-error: true
        run: |
          SLACK_BOT_TOKEN=$(curl -sf --max-time 5 http://localhost:8100/secrets/SLACK_BOT_TOKEN \
            -H "Authorization: Bearer ${SECRET_MANAGER_TOKEN}" | jq -r '.value // empty' 2>/dev/null || true)
          export SLACK_BOT_TOKEN

          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "Skipping Slack notification: missing secrets"
            exit 0
          fi

          ERROR_LOG=""
          if [ "${{ job.status }}" = "failure" ]; then
            ERROR_LOG=$(gh run view ${{ github.run_id }} --log-failed --repo ${{ github.repository }} 2>&1 | tail -40 || echo "Failed to fetch logs")
          fi

          export OPENAI_API_KEY
          ./scripts/deploy-notify.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "all" \
            "${{ github.repository }}" \
            "${{ job.status }}" \
            "$ERROR_LOG"
