display_information:
  name: Centaur
  description: Centaur AI agent
  background_color: "#000000"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Centaur AI
    always_online: true
  assistant_view:
    assistant_description: AI agent that can research, analyze, code, and execute tasks.
    suggested_prompts:
      - title: Research a topic
        message: "Research the latest developments on..."
      - title: Analyze data
        message: "Analyze the following data and summarize key findings:"

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - im:history
      - groups:read
      - reactions:read
      - reactions:write
      - search:read.files
      - search:read.public
      - search:read.users
      - usergroups:read
      - users:read
      - users:read.email
      - assistant:write

settings:
  interactivity:
    is_enabled: true
    request_url: https://svc-ai.paradigm.xyz/api/slack/interactions
  event_subscriptions:
    request_url: https://svc-ai.paradigm.xyz/api/webhooks/slack
    bot_events:
      - app_mention
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.channels
      - message.groups
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
