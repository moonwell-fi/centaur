[project]
name = "vmetrics"
description = "VictoriaMetrics — PromQL/MetricsQL queries for agent self-validation"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ai-v2]
module = "client.py"
hosts = []
secrets = ["VICTORIAMETRICS_URL"]
