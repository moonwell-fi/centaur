[project]
name = "legistorm"
description = "LegiStorm CLI for congressional data"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.ai-v2]
module = "client.py"
hosts = ["api.legistorm.com"]
secrets = ["LEGISTORM_API_KEY"]
optional_secrets = ["LEGISTORM_ISSUES_ENDPOINT"]
