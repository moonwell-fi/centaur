[project]
name = "docsend"
description = "DocSend document downloader — cloud browser + Playwright"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "browser-use-sdk>=2.0.14",
    "httpx>=0.28.0",
    "pillow>=12.0.0",
    "playwright>=1.50.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ai-v2]
module = "client.py"
hosts = ["docsend.com", "api.browser-use.com"]
secrets = ["BROWSER_USE_API_KEY"]
