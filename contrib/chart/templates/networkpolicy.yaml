{{- if .Values.networkPolicy.enabled }}
{{- $ingressSourceNamespaces := default .Values.networkPolicy.ingressControllerNamespaces .Values.networkPolicy.ingressSourceNamespaces }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-default-deny
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-allow-dns
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
---
{{- end }}
{{- if .Values.laminar.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-laminar-internal
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - {{ include "centaur.name" . | quote }}
      - key: app.kubernetes.io/instance
        operator: In
        values:
          - {{ .Release.Name | quote }}
      - key: app.kubernetes.io/component
        operator: In
        values:
          - laminar-postgres
          - laminar-clickhouse
          - laminar-quickwit
          - laminar-query-engine
          - laminar-app-server
          - laminar-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - {{ include "centaur.name" . | quote }}
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name | quote }}
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - laminar-postgres
                  - laminar-clickhouse
                  - laminar-quickwit
                  - laminar-query-engine
                  - laminar-app-server
                  - laminar-frontend
                  - api
                  - secrets
                  - slackbot
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - {{ include "centaur.name" . | quote }}
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name | quote }}
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - laminar-postgres
                  - laminar-clickhouse
                  - laminar-quickwit
                  - laminar-query-engine
                  - laminar-app-server
                  - laminar-frontend
    - ports:
        - protocol: TCP
          port: 443
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "secrets") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "secrets") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 6 }}
  policyTypes:
    - Ingress
{{- if or (eq .Values.secretManager.backend "onepassword") .Values.laminar.enabled }}
    - Egress
{{- end }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
      ports:
        - protocol: TCP
          port: 8100
{{- if or (eq .Values.secretManager.backend "onepassword") .Values.laminar.enabled }}
  egress:
{{- if eq .Values.secretManager.backend "onepassword" }}
    # Direct 1Password mode needs outbound HTTPS to the 1Password API.
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- if .Values.laminar.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-app-server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.grpcPort }}
{{- end }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "pgbouncer") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "pgbouncer") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- else }}
    - {}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 14 }}
        - podSelector:
            matchLabels:
              centaur.ai/managed: "true"
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
{{- range .Values.networkPolicy.apiIngressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8100
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.ironProxy.manager.service.controlPort }}
{{- if .Values.laminar.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-app-server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.grpcPort }}
{{- end }}
    - ports:
        - protocol: TCP
          port: 443
---
{{- if .Values.slackbot.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- range $ingressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8100
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.ironProxy.manager.service.controlPort }}
{{- if .Values.laminar.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "laminar-app-server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.laminar.appServer.service.grpcPort }}
{{- end }}
    # Slack bootstrap and message delivery need direct HTTPS egress.
    - ports:
        - protocol: TCP
          port: 443
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "iron-proxy") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "iron-proxy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.manager.service.controlPort }}
  egress:
    # firewall-manager polls the api for the injection map.
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    # iron-proxy forwards sandbox traffic to external HTTP(S) endpoints.
    # Restricting to 80/443 keeps in-cluster services (notably the
    # secret manager on 8100) unreachable from this pod.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
---
{{- if eq .Values.ironProxy.manager.secretSource "onepassword-connect" }}
# Targets the 1Password Connect subchart's pods, which carry
# `app: <applicationName>` (default `onepassword-connect`).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-onepassword-connect
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "centaur.onepasswordConnectAppName" . | quote }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ include "centaur.onepasswordConnectPort" . }}
  egress:
    # connect-sync needs outbound HTTPS to my.1password.com.
    - ports:
        - protocol: TCP
          port: 443
---
{{- end }}
{{- if .Values.repoCache.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "repo-cache") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "repo-cache") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "repo-cache") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
{{- range .Values.repoCache.egressPorts }}
    - ports:
        - protocol: TCP
          port: {{ . }}
{{- end }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-sandbox
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/managed: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
