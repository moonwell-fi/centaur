secretManager:
  backend: onepassword
  envPrefix: ""
  existingSecretName: centaur-infra-env

firewall:
  existingCaSecretName: centaur-firewall-ca
  existingCaKeySecretName: centaur-firewall-ca-key

postgres:
  auth:
    existingSecretName: centaur-infra-env
    existingSecretKey: POSTGRES_PASSWORD

slackbot:
  enabled: false
  image:
    pullPolicy: IfNotPresent

slackbotv2:
  image:
    pullPolicy: IfNotPresent

api:
  image:
    pullPolicy: IfNotPresent
  executionWorkerEnabled: true
  pluginWatcherEnabled: true
  egressDiscovery:
    enabled: false

apiRs:
  enabled: true
  image:
    pullPolicy: IfNotPresent

web:
  enabled: true
  image:
    pullPolicy: IfNotPresent

ironProxy:
  image:
    pullPolicy: IfNotPresent
  secretSource: env

tokenBroker:
  enabled: false

sandbox:
  image:
    pullPolicy: IfNotPresent

agentSandbox:
  enabled: true

# Run the tool-server sidecar by default in dev so local clusters mirror
# production sandbox topology.
toolServer:
  enabled: true
