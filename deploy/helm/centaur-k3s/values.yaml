nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []

secretManager:
  backend: env
  envPrefix: CENTAUR_SECRET_
  generatedSecret:
    enabled: true
  secrets:
    firewallControlToken: ""
    slackBotToken: ""
    slackSigningSecret: ""
    slackbotApiKey: ""
    localDevApiKey: ""
    sandboxSigningKey: ""
  extraSecrets: {}

firewall:
  image:
    repository: centaur-firewall
    tag: latest
    pullPolicy: IfNotPresent
  service:
    proxyPort: 8080
    controlPort: 8081
  ca:
    certPem: ""
    keyPem: ""
  extraEnv: {}

secrets:
  image:
    repository: centaur-secrets
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv: {}

api:
  replicaCount: 1
  image:
    repository: centaur-api
    tag: latest
    pullPolicy: IfNotPresent
  sandboxBackend: docker
  dockerHost: ""
  executionWorkerEnabled: false
  workflowWorkerEnabled: true
  warmPoolEnabled: false
  victoriaMetricsPushEnabled: false
  runtimeCredentialGuardEnabled: true
  requiredRuntimeSecretKeys: AMP_API_KEY
  extraEnv: {}
  resources: {}

sandbox:
  image:
    repository: centaur-agent
    tag: latest
    pullPolicy: IfNotPresent
  runtimeClassName: ""
  reposPvcName: ""

slackbot:
  enabled: true
  replicaCount: 1
  image:
    repository: centaur-slackbot
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv: {}
  resources: {}

pgbouncer:
  image:
    repository: centaur-pgbouncer
    tag: latest
    pullPolicy: IfNotPresent
  authType: scram-sha-256
  poolMode: transaction
  maxClientConn: 200
  defaultPoolSize: 25
  resources: {}

postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg16
    pullPolicy: IfNotPresent
  auth:
    database: ai_v2
    username: tempo
    password: tempo_dev_change_me
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""
  resources: {}

database:
  appUrl: ""
  pgbouncerUrl: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: centaur.local
  tls: []

runnerAccess:
  enabled: false
  allowedCidrs: []
  apiService:
    type: LoadBalancer
    loadBalancerSourceRanges: []
  firewallService:
    type: LoadBalancer
    loadBalancerSourceRanges: []

networkPolicy:
  enabled: true
  ingressControllerNamespaces:
    - kube-system

podSecurityContext:
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
