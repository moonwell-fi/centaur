{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            tcpSocket:
              port: 5432
          livenessProbe:
            tcpSocket:
              port: 5432
          resources:
{{ toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "secrets") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "secrets") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca "database" .Values.database "postgresAuth" .Values.postgres.auth) | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: secrets
          image: {{ printf "%s:%s" .Values.secrets.image.repository .Values.secrets.image.tag | quote }}
          imagePullPolicy: {{ .Values.secrets.image.pullPolicy }}
          env:
            - name: SECRET_MANAGER_BACKEND
              value: {{ .Values.secretManager.backend | quote }}
            - name: SECRET_ENV_PREFIX
              value: {{ .Values.secretManager.envPrefix | quote }}
{{- range $name, $value := .Values.secrets.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          envFrom:
            - secretRef:
                name: {{ include "centaur.secretEnvName" . }}
          ports:
            - containerPort: 8100
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "firewall") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "firewall") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "firewallCa" .Values.firewall.ca) | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: firewall
          image: {{ printf "%s:%s" .Values.firewall.image.repository .Values.firewall.image.tag | quote }}
          imagePullPolicy: {{ .Values.firewall.image.pullPolicy }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:8100" (include "centaur.componentName" (dict "root" . "component" "secrets")) | quote }}
            - name: FIREWALL_TRUSTED_INTERNAL_HOSTS
              value: {{ printf "%s,%s.%s.svc.cluster.local,api" (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "api")) .Release.Namespace | quote }}
{{- range $name, $value := .Values.firewall.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: {{ .Values.firewall.service.proxyPort }}
              name: proxy
            - containerPort: {{ .Values.firewall.service.controlPort }}
              name: control
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.firewall.service.controlPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.firewall.service.controlPort }}
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "pgbouncer") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "pgbouncer") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "postgresAuth" .Values.postgres.auth) | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: {{ printf "%s:%s" .Values.pgbouncer.image.repository .Values.pgbouncer.image.tag | quote }}
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.controlPort | quote }}
            - name: AUTH_TYPE
              value: {{ .Values.pgbouncer.authType | quote }}
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            tcpSocket:
              port: 5432
          livenessProbe:
            tcpSocket:
              port: 5432
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.pgbouncer.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      automountServiceAccountToken: {{ ternary "true" "false" (eq .Values.api.sandboxBackend "kubernetes") }}
      {{- if eq .Values.api.sandboxBackend "kubernetes" }}
      serviceAccountName: {{ include "centaur.apiServiceAccountName" . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ printf "%s:%s" .Values.api.image.repository .Values.api.image.tag | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.controlPort | quote }}
            - name: FIREWALL_HEALTH_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.controlPort | quote }}
            - name: HTTPS_PROXY
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.proxyPort | quote }}
            - name: REQUESTS_CA_BUNDLE
              value: /firewall-certs/ca-cert.pem
            - name: SSL_CERT_FILE
              value: /firewall-certs/ca-cert.pem
            - name: CENTAUR_LOG_LEVEL
              value: info
            - name: TOOL_DIRS
              value: /app/tools
            - name: WORKFLOW_DIRS
              value: /app/workflows
            - name: AGENT_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: FIREWALL_HOST
              value: {{ include "centaur.componentName" (dict "root" . "component" "firewall") | quote }}
            - name: SANDBOX_BACKEND
              value: {{ .Values.api.sandboxBackend | quote }}
            - name: EXECUTION_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.executionWorkerEnabled | quote }}
            - name: WORKFLOW_WORKER_ENABLED
              value: {{ ternary "1" "0" .Values.api.workflowWorkerEnabled | quote }}
            - name: WARM_POOL_ENABLED
              value: {{ ternary "1" "0" .Values.api.warmPoolEnabled | quote }}
            - name: AGENT_IMAGE
              value: {{ printf "%s:%s" .Values.sandbox.image.repository .Values.sandbox.image.tag | quote }}
            - name: KUBERNETES_AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.sandbox.image.pullPolicy | quote }}
            - name: KUBERNETES_FIREWALL_CA_SECRET_NAME
              value: {{ include "centaur.trustedCaSecretName" . | quote }}
            - name: KUBERNETES_NAMESPACE
              value: {{ .Release.Namespace | quote }}
{{- if .Values.sandbox.runtimeClassName }}
            - name: KUBERNETES_SANDBOX_RUNTIME_CLASS_NAME
              value: {{ .Values.sandbox.runtimeClassName | quote }}
{{- end }}
{{- if .Values.sandbox.reposPvcName }}
            - name: KUBERNETES_REPOS_PVC_NAME
              value: {{ .Values.sandbox.reposPvcName | quote }}
{{- end }}
{{- if .Values.global.imagePullSecrets }}
            - name: KUBERNETES_SANDBOX_IMAGE_PULL_SECRETS
              value: "{{- range $index, $secret := .Values.global.imagePullSecrets }}{{- if $index }},{{ end -}}{{ $secret.name }}{{- end }}"
{{- end }}
            - name: VICTORIAMETRICS_PUSH_ENABLED
              value: {{ ternary "1" "0" .Values.api.victoriaMetricsPushEnabled | quote }}
            - name: RUNTIME_CREDENTIAL_GUARD_ENABLED
              value: {{ ternary "1" "0" .Values.api.runtimeCredentialGuardEnabled | quote }}
            - name: REQUIRED_RUNTIME_SECRET_KEYS
              value: {{ .Values.api.requiredRuntimeSecretKeys | quote }}
{{- if .Values.slackbot.enabled }}
            - name: SLACKBOT_URL
              value: {{ printf "http://%s:3001" (include "centaur.componentName" (dict "root" . "component" "slackbot")) | quote }}
{{- end }}
{{- if .Values.api.dockerHost }}
            - name: DOCKER_HOST
              value: {{ .Values.api.dockerHost | quote }}
{{- end }}
{{- range $name, $value := .Values.api.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
          secret:
            secretName: {{ include "centaur.trustedCaSecretName" . }}
---
{{- if .Values.slackbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  replicas: {{ .Values.slackbot.replicaCount }}
  selector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret-env: {{ toJson (dict "secretManager" .Values.secretManager "database" .Values.database "firewallCa" .Values.firewall.ca) | sha256sum }}
        checksum/firewall-ca: {{ toJson .Values.firewall.ca | sha256sum }}
      labels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: slackbot
          image: {{ printf "%s:%s" .Values.slackbot.image.repository .Values.slackbot.image.tag | quote }}
          imagePullPolicy: {{ .Values.slackbot.image.pullPolicy }}
          env:
            - name: FIREWALL_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "centaur.secretEnvName" . }}
                  key: {{ printf "%sFIREWALL_CONTROL_TOKEN" .Values.secretManager.envPrefix }}
            - name: CENTAUR_API_URL
              value: {{ printf "http://%s:8000" (include "centaur.componentName" (dict "root" . "component" "api")) | quote }}
            - name: SECRET_MANAGER_URL
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.controlPort | quote }}
            - name: HTTPS_PROXY
              value: {{ printf "http://%s:%v" (include "centaur.componentName" (dict "root" . "component" "firewall")) .Values.firewall.service.proxyPort | quote }}
            - name: NODE_EXTRA_CA_CERTS
              value: /firewall-certs/ca-cert.pem
            - name: NO_PROXY
              value: {{ printf "localhost,127.0.0.1,%s,%s,%s,%s" (include "centaur.componentName" (dict "root" . "component" "postgres")) (include "centaur.componentName" (dict "root" . "component" "pgbouncer")) (include "centaur.componentName" (dict "root" . "component" "api")) (include "centaur.componentName" (dict "root" . "component" "firewall")) | quote }}
{{- range $name, $value := .Values.slackbot.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
          volumeMounts:
            - name: firewall-ca
              mountPath: /firewall-certs
              readOnly: true
          securityContext:
{{ toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml .Values.slackbot.resources | nindent 12 }}
      volumes:
        - name: firewall-ca
          secret:
            secretName: {{ include "centaur.trustedCaSecretName" . }}
{{- end }}
