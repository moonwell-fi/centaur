{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-default-deny
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-allow-dns
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "secrets") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "secrets") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "secrets") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "pgbouncer") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "pgbouncer") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- else }}
    - {}
{{- end }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.controlPort }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.firewall.service.controlPort }}
{{- if eq .Values.api.sandboxBackend "kubernetes" }}
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
---
{{- if .Values.slackbot.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- range .Values.networkPolicy.ingressControllerNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.firewall.service.controlPort }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "firewall") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "firewall") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
              centaur.ai/managed: "true"
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.proxyPort }}
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.controlPort }}
  egress:
    - {}
---
{{- if eq .Values.api.sandboxBackend "kubernetes" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-sandbox
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/managed: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "firewall") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.firewall.service.proxyPort }}
{{- end }}
{{- end }}
