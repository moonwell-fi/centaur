secretManager:
  secrets:
    firewallControlToken: replace-me-with-a-long-random-string
    slackBotToken: xoxb-replace-me
    slackSigningSecret: replace-me
    slackbotApiKey: aiv2_replace_me
    sandboxSigningKey: replace-me-with-a-long-random-string
  extraSecrets:
    AMP_API_KEY: replace-me
    ANTHROPIC_API_KEY: replace-me

firewall:
  ca:
    certPem: |
      -----BEGIN CERTIFICATE-----
      replace-me
      -----END CERTIFICATE-----
    keyPem: |
      -----BEGIN PRIVATE KEY-----
      replace-me
      -----END PRIVATE KEY-----

api:
  dockerHost: tcp://runner.internal.example:2375
  executionWorkerEnabled: true
  extraEnv:
    AGENT_API_URL: http://centaur-api.internal.example:8000
    FIREWALL_HOST: centaur-firewall.internal.example

# For the experimental in-cluster sandbox backend instead of a private Docker runner:
# api:
#   sandboxBackend: kubernetes
#   executionWorkerEnabled: true
# sandbox:
#   runtimeClassName: gvisor
#   reposPvcName: centaur-repos

runnerAccess:
  enabled: true
  allowedCidrs:
    - 10.20.30.0/24
  apiService:
    loadBalancerSourceRanges:
      - 10.20.30.0/24
  firewallService:
    loadBalancerSourceRanges:
      - 10.20.30.0/24

ingress:
  enabled: true
  className: traefik

networkPolicy:
  ingressControllerNamespaces:
    - kube-system
